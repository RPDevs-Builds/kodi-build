name: Build and Release Kodi

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build Linux (${{ matrix.branch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        branch: ['master', 'Omega']
    steps:
      - name: Checkout Kodi Source
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: ${{ matrix.branch }}
          path: kodi-source
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo add-apt-repository -s ppa:team-xbmc/xbmc-nightly -y
          sudo apt update
          sudo apt build-dep kodi -y
          sudo apt install -y rpm ruby ruby-dev rubygems build-essential ccache
          sudo gem install --no-document fpm

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ matrix.branch }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.branch }}-ccache-

      - name: Configure CMake
        run: |
          mkdir build
          cmake -S kodi-source -B build \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DAPP_RENDER_SYSTEM=gl \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build Kodi
        run: cmake --build build -- -j$(nproc)

      - name: Create Standalone Archive
        run: |
          DESTDIR=install_dir cmake --install build
          tar -czf kodi-linux-${{ matrix.branch }}-standalone.tar.gz -C install_dir .

      - name: Create DEB and RPM Packages
        run: |
          mkdir -p pkg_root
          DESTDIR=$(pwd)/pkg_root cmake --install build
          VERSION=$(grep "VERSION_CODE" kodi-source/version.txt | awk '{print $2}')
          fpm -s dir -t deb -n kodi -v "$VERSION" -C pkg_root usr/
          fpm -s dir -t rpm -n kodi -v "$VERSION" -C pkg_root usr/

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.branch }}
          path: |
            *.deb
            *.rpm
            *.tar.gz

  build-windows:
    name: Build Windows (${{ matrix.branch }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        branch: ['master', 'Omega']
    steps:
      - name: Checkout Kodi Source
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: ${{ matrix.branch }}
          path: kodi-source
          fetch-depth: 1

      - name: Install Dependencies
        shell: pwsh
        run: |
          pip install meson
          choco install pkgconfiglite -y

      - name: Configure and Build
        shell: pwsh
        run: |
          mkdir build
          cmake -S kodi-source -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Create Standalone Zip
        shell: pwsh
        run: |
          cmake --install build --prefix install_win --config Release
          Compress-Archive -Path install_win\* -DestinationPath kodi-windows-${{ matrix.branch }}-standalone.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages-${{ matrix.branch }}
          path: |
            build/Release/*.exe
            build/Release/*.msi
            *.zip

  create-release:
    name: Create GitHub Release (${{ matrix.branch }})
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: ['master', 'Omega']
    steps:
      - name: Checkout code (to get version.txt)
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: ${{ matrix.branch }}
          path: kodi-source
          fetch-depth: 1

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages-${{ matrix.branch }}
          path: linux-packages

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages-${{ matrix.branch }}
          path: windows-packages

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep "VERSION_CODE" kodi-source/version.txt | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}-${{ matrix.branch }}
          name: Kodi Build ${{ steps.get_version.outputs.version }} (${{ matrix.branch }})
          files: |
            linux-packages/*.deb
            linux-packages/*.rpm
            linux-packages/*.tar.gz
            windows-packages/*.zip
            windows-packages/*.exe
            windows-packages/*.msi
          draft: false
          prerelease: true