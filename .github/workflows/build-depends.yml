name: Build and Release Depends

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight
  workflow_dispatch:
    inputs:
      branch:
        description: 'Kodi Branch'
        required: true
        default: 'master'

permissions:
  contents: write

jobs:
  build-depends:
    name: Build Depends (${{ matrix.platform }})
    runs-on: ${{ (matrix.platform == 'osx64' && 'macos-latest') || fromJSON('["self-hosted", "linux64"]') }}
    strategy:
      fail-fast: false
      matrix:
        platform: [android-arm64, osx64] # Native linux/windows don't use this bootstrapped method natively in our fleet right now, but add if needed
    steps:
      - name: Checkout Kodi
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: ${{ github.event.inputs.branch || 'master' }}
          path: source/xbmc

      - name: Install macOS Dependencies
        if: ${{ matrix.platform == 'osx64' }}
        run: brew install cmake ninja nasm gettext coreutils groff

      - name: Build Depends
        run: |
          mkdir -p xbmc-deps
          cd source/xbmc/tools/depends
          ./bootstrap
          case "${{ matrix.platform }}" in
            android-arm64) export CONFIG_FLAGS="--host=aarch64-linux-android --with-sdk-path=/opt/android-sdk --with-ndk-path=/opt/android-sdk/ndk/25.2.9519653" ;;
            osx64) 
              export CONFIG_FLAGS="--with-platform=macos"
              export PATH="$(brew --prefix gettext)/bin:$(brew --prefix coreutils)/libexec/gnubin:$PATH"
              ;;
          esac
          ./configure --prefix=${{ github.workspace }}/xbmc-deps $CONFIG_FLAGS
          make -j$(nproc || sysctl -n hw.ncpu)

      - name: Archive Depends
        run: |
          tar -czf depends-${{ matrix.platform }}.tar.gz -C xbmc-deps .

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          TAG="depends-${{ matrix.platform }}-${{ github.event.inputs.branch || 'master' }}"
          gh release create "$TAG" depends-${{ matrix.platform }}.tar.gz \
            --repo "RPDevs-Builds/kodi-build" \
            --title "Pre-compiled Depends: ${{ matrix.platform }} (${{ github.event.inputs.branch || 'master' }})" \
            --notes "Automated depends build." \
            --prerelease || \
          gh release upload "$TAG" depends-${{ matrix.platform }}.tar.gz --repo "RPDevs-Builds/kodi-build" --clobber
